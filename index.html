<html lang="en">

<head>

      display: block;
      margin: 0 auto 16px auto;
      max-height: 80px;
      width: auto;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background-color: #0b0b0b;
      color: #ffffff;
      padding: 20px 16px 160px 16px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
      padding-top: 10px;
    }

    header h1 {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 3px;
      color: #ffffff;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    header .buyopp-title {
      font-weight: 300;
      font-size: 12px;
      color: #d4af37;
      letter-spacing: 1px;
    }

    .deadline-text {
      font-weight: 300;
      font-size: 11px;
      color: #9a9a9a;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    /* ── Filter chips ──────────────────────────────── */
    .filters-bar {
      padding: 10px 0 12px;
      margin-bottom: 4px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .chip {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 500;
      color: #9a9a9a;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
      white-space: nowrap;
      user-select: none;
      -webkit-user-select: none;
    }

    .chip.active {
      background: rgba(212, 175, 55, 0.12);
      border-color: #d4af37;
      color: #d4af37;
    }

    /* ── Section / grid ────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #d4af37;
      margin: 24px 0 10px 4px;
      border-left: 2px solid #d4af37;
      padding-left: 8px;
    }

    .bodega-desc {
      font-size: 11px;
      color: #9a9a9a;
      margin: -4px 0 12px 4px;
      line-height: 1.4;
      font-weight: 300;
    }

    .grid-container {
      background: #121212;
      border-radius: 8px;
      border: 1px solid #222;
      overflow: hidden;
    }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid #1a1a1a;
      background: #161616;
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
    }

    .header-details {
      flex: 1;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-price {
      min-width: 65px;
      text-align: right;
    }

    .header-qty {
      width: 132px;
      text-align: center;
    }

    /* ── Wine rows ─────────────────────────────────── */
    .wine-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
      border-left: 3px solid transparent;
      transition: border-left-color 0.18s ease, background 0.18s ease;
    }

    .wine-row:last-child {
      border-bottom: none;
    }

    .wine-row.has-qty {
      border-left-color: #d4af37;
      background: rgba(212, 175, 55, 0.04);
    }

    .wine-details {
      flex: 1;
      min-width: 0;
      padding-right: 12px;
      font-size: 12px;
      font-weight: 500;
      color: #ffffff;
    }

    .wine-meta {
      font-weight: 300;
      color: #9a9a9a;
      font-size: 11px;
    }

    .right-controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .wine-price {
      color: #ffffff;
      font-weight: 600;
      font-size: 13px;
      text-align: right;
      min-width: 65px;
    }

    /* ── Quantity controls ─────────────────────────── */
    .qty-container {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      height: 44px;
    }

    .qty-btn {
      background: transparent;
      border: none;
      color: #ffffff;
      width: 44px;
      height: 100%;
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qty-btn:active {
      background: #2a2a2a;
      color: #d4af37;
    }

    .qty-val {
      width: 40px;
      height: 100%;
      background: transparent;
      border: none;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #ffffff;
      outline: none;
      -webkit-appearance: none;
      margin: 0;
    }

    .qty-val::-webkit-outer-spin-button,
    .qty-val::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .qty-val[type=number] {
      -moz-appearance: textfield;
    }

    /* ── Order summary table ───────────────────────── */
    .order-summary {
      background: #121212;
      border-radius: 8px;
      border: 1px solid #222;
      padding: 16px;
      margin-top: 24px;
      margin-bottom: 0;
    }

    .order-summary-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffffff;
      margin-bottom: 12px;
    }

    .order-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .order-table th {
      text-align: left;
      font-weight: 600;
      color: #9a9a9a;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 0 8px;
      border-bottom: 1px solid #222;
    }

    .order-table th.th-qty,
    .order-table td.td-qty {
      text-align: center;
      padding-left: 8px;
      padding-right: 8px;
    }

    .order-table th.th-total,
    .order-table td.td-total {
      text-align: right;
    }

    .order-table td {
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
      color: #ffffff;
      vertical-align: top;
    }

    .order-table tr:last-child td {
      border-bottom: none;
    }

    .td-wine {
      font-weight: 500;
    }

    .td-meta {
      color: #9a9a9a;
      font-weight: 300;
      font-size: 10px;
      margin-top: 2px;
    }

    .td-qty {
      color: #9a9a9a;
    }

    .td-total {
      color: #d4af37;
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Client form ───────────────────────────────── */
    .client-form {
      background: #121212;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      margin-top: 24px;
      margin-bottom: 0;
    }

    .form-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #ffffff;
      margin-bottom: 12px;
    }



    .input-group {
      margin-bottom: 10px;
      flex: 1;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      color: #ffffff;
      font-size: 12px;
    }

    input:focus {
      border-color: #d4af37;
      outline: none;
    }

    /* ── Footer bar ────────────────────────────────── */
    .footer-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #000000;
      border-top: 1px solid #222;
      padding: 12px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    .footer-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .total-box {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .total-row {
      font-size: 11px;
      color: #9a9a9a;
      font-weight: 400;
    }

    .total-row span {
      color: #ffffff;
      font-weight: 600;
    }

    .submit-btn {
      background: #ffffff;
      color: #000000;
      border: none;
      padding: 12px 24px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 6px;
      cursor: pointer;
      height: 44px;
      transition: background 0.18s ease, color 0.18s ease;
    }

    .submit-btn:disabled {
      background: #444;
      color: #888;
      cursor: not-allowed;
    }

    .submit-btn.submitted {
      background: #1a3d1a;
      color: #5fc75f;
    }

    .submit-helper {
      font-size: 10px;
      color: #9a9a9a;
      font-weight: 300;
      text-align: right;
    }

    .submit-error {
      font-size: 10px;
      color: #e05555;
      font-weight: 400;
      text-align: right;
      display: none;
    }
  </style>
</head>

    };

    // ── State ─────────────────────────────────────────────────────────────
    let orderQuantities = {};
    let activeFilters = { bodega: new Set(), type: new Set() };

    // ── Group wines by bodega ─────────────────────────────────────────────
    const grouped = {};
    wineData.forEach((wine, idx) => {
      if (!grouped[wine.bodega]) grouped[wine.bodega] = [];
      grouped[wine.bodega].push({ ...wine, id: idx });
    });

    // ── Render product list ───────────────────────────────────────────────
    const listContainer = document.getElementById('allocation-list');

    for (const bodega in grouped) {
      const desc = bodegaDescriptions[bodega] || '';
      const section = document.createElement('div');
      section.dataset.bodega = bodega;

      const titleEl = document.createElement('div');
      titleEl.className = 'section-title';
      titleEl.textContent = `Bodegas ${bodega}`;
      section.appendChild(titleEl);

      if (desc) {
        const descEl = document.createElement('p');
        descEl.className = 'bodega-desc';
        descEl.textContent = desc;
        section.appendChild(descEl);
      }

      const grid = document.createElement('div');
      grid.className = 'grid-container';

      const headerRow = document.createElement('div');
      headerRow.className = 'grid-header';
      headerRow.innerHTML = `
        <div class="header-details">Wine</div>
        <div class="header-controls">
          <div class="header-price">Price (ex VAT)</div>
          <div class="header-qty">Quantity</div>
        </div>
      `;
      grid.appendChild(headerRow);

      grouped[bodega].forEach(wine => {
        const row = document.createElement('div');
        row.className = 'wine-row';
        row.dataset.wineId = wine.id;
        row.dataset.type = wine.type;
        row.dataset.size = wine.cl;
        row.innerHTML = `
          <div class="wine-details">
            ${wine.range} <span class="wine-meta">(${wine.type}, ${wine.cl}cl)</span>
          </div>
          <div class="right-controls">
            <div class="wine-price">&euro;${wine.price.toFixed(2)}</div>

                oninput="handleInputQty(${wine.id}, this.value)"
                onblur="sanitizeInputQty(this, ${wine.id})">
              <button class="qty-btn" onclick="updateQty(${wine.id}, 1)" aria-label="Increase quantity">&plus;</button>

          </div>

    const types = ['Still wine', 'Manzanilla', 'Amontillado', 'Palo Cortado', 'Oloroso', 'Medium', 'Cream', 'Moscatel', 'Pedro Ximénez', 'Vinagre'];

    function appendFilterGroup(items, filterKey, rowEl) {
      items.forEach(item => {
        const chip = document.createElement('button');
        chip.className = 'chip';
        chip.textContent = item;
        chip.dataset.value = item;
        chip.setAttribute('aria-pressed', 'false');
        chip.addEventListener('click', () => {
          const isActive = activeFilters[filterKey].has(item);
          if (isActive) {
            activeFilters[filterKey].delete(item);
            chip.classList.remove('active');
            chip.setAttribute('aria-pressed', 'false');
          } else {
            activeFilters[filterKey].add(item);
            chip.classList.add('active');
            chip.setAttribute('aria-pressed', 'true');
          }
          applyFilters();
        });
        rowEl.appendChild(chip);
      });
    }

    const filtersBar = document.getElementById('filters-bar');
    const bodegaRow = document.createElement('div');
    bodegaRow.className = 'filter-row';
    bodegaRow.setAttribute('aria-label', 'Filter by bodega');
    appendFilterGroup(bodegas, 'bodega', bodegaRow);
    filtersBar.appendChild(bodegaRow);

    const typeRow = document.createElement('div');
    typeRow.className = 'filter-row';
    typeRow.setAttribute('aria-label', 'Filter by type');
    appendFilterGroup(types, 'type', typeRow);
    filtersBar.appendChild(typeRow);

    function applyFilters() {
      document.querySelectorAll('[data-bodega]').forEach(section => {
        const bodega = section.dataset.bodega;
        let sectionVisible = false;

        section.querySelectorAll('.wine-row').forEach(row => {
          const matchBodega = activeFilters.bodega.size === 0 || activeFilters.bodega.has(bodega);

          let rowType = row.dataset.type;
          if (rowType === 'Manzanilla pasada') {
            rowType = 'Manzanilla';
          }

          const matchType = activeFilters.type.size === 0 || activeFilters.type.has(rowType);
          const visible = matchBodega && matchType;
          row.style.display = visible ? '' : 'none';
          if (visible) sectionVisible = true;
        });

        section.style.display = sectionVisible ? '' : 'none';
      });
    }

    // ── Quantity helpers ──────────────────────────────────────────────────
    function updateQty(id, delta) {
      let current = orderQuantities[id] || 0;
      current = Math.max(0, current + delta);
      orderQuantities[id] = current;
      const input = document.getElementById(`qty-${id}`);
      if (input) input.value = current;
      updateRowHighlight(id);
      calculateTotal();
      renderOrderSummary();
      saveCart();
    }

    function handleInputQty(id, value) {
      let val = parseInt(value, 10);
      if (isNaN(val) || val < 0) val = 0;
      orderQuantities[id] = val;
      updateRowHighlight(id);
      calculateTotal();
      renderOrderSummary();
      saveCart();
    }

    function sanitizeInputQty(el, id) {
      let val = parseInt(el.value, 10);
      if (isNaN(val) || val < 0) val = 0;
      el.value = val;
      orderQuantities[id] = val;
    }

    function updateRowHighlight(id) {
      const row = document.querySelector(`.wine-row[data-wine-id="${id}"]`);
      if (!row) return;
      row.classList.toggle('has-qty', (orderQuantities[id] || 0) > 0);
    }

    // ── Totals ────────────────────────────────────────────────────────────
    function calculateTotal() {
      let totalExVat = 0;
      for (const id in orderQuantities) {
        if (orderQuantities[id] > 0) {
          totalExVat += orderQuantities[id] * wineData[id].price;
        }
      }
      document.getElementById('total-ex-vat').textContent = `€${totalExVat.toFixed(2)}`;
      document.getElementById('total-inc-vat').textContent = `€${(totalExVat * 1.21).toFixed(2)}`;
    }

    // ── Order summary table ───────────────────────────────────────────────
    function renderOrderSummary() {
      const tbody = document.getElementById('order-table-body');
      const summary = document.getElementById('order-summary');
      tbody.innerHTML = '';
      let hasItems = false;

      wineData.forEach((wine, id) => {
        const qty = orderQuantities[id] || 0;
        if (qty > 0) {
          hasItems = true;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>
              <div class="td-wine">${wine.range}</div>
              <div class="td-meta">${wine.type}, ${wine.cl}cl</div>
            </td>
            <td class="td-qty">${qty}</td>
            <td class="td-total">€${(qty * wine.price).toFixed(2)}</td>
          `;
          tbody.appendChild(tr);
        }
      });

      summary.style.display = hasItems ? '' : 'none';
    }

    // ── localStorage ──────────────────────────────────────────────────────
    function saveCart() {
      try { localStorage.setItem(LS_CART_KEY, JSON.stringify(orderQuantities)); } catch (e) { }
    }

    function saveForm() {
      try {
        localStorage.setItem(LS_FORM_KEY, JSON.stringify({
          name: document.getElementById('form-name').value,
          company: document.getElementById('form-company').value,
          phone: document.getElementById('form-phone').value,
          email: document.getElementById('form-email').value,
          address: document.getElementById('form-address').value,
          postal: document.getElementById('form-postal').value,
        }));
      } catch (e) { }
    }

    function restoreState() {
      try {
        const savedCart = localStorage.getItem(LS_CART_KEY);
        if (savedCart) {
          orderQuantities = JSON.parse(savedCart);
          for (const id in orderQuantities) {
            const input = document.getElementById(`qty-${id}`);
            if (input) input.value = orderQuantities[id];
            updateRowHighlight(parseInt(id, 10));
          }
          calculateTotal();
          renderOrderSummary();
        }
      } catch (e) { }

      try {
        const savedForm = localStorage.getItem(LS_FORM_KEY);
        if (savedForm) {
          const fd = JSON.parse(savedForm);
          document.getElementById('form-name').value = fd.name || '';
          document.getElementById('form-company').value = fd.company || '';
          document.getElementById('form-phone').value = fd.phone || '';
          document.getElementById('form-email').value = fd.email || '';
          document.getElementById('form-address').value = fd.address || '';
          document.getElementById('form-postal').value = fd.postal || '';
        }
      } catch (e) { }
    }

    ['form-name', 'form-company', 'form-phone', 'form-email', 'form-address', 'form-postal'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', saveForm);
    });

    restoreState();

    // ── Submit ────────────────────────────────────────────────────────────
    function submitAllocation() {
      const name = document.getElementById('form-name').value.trim();
      const company = document.getElementById('form-company').value.trim();
      const phone = document.getElementById('form-phone').value.trim();
      const email = document.getElementById('form-email').value.trim();
      const address = document.getElementById('form-address').value.trim();
      const postal = document.getElementById('form-postal').value.trim();

      if (!name || !phone || !email || !address || !postal) {
        alert('Please complete your contact details.');
        return;
      }

      const itemsArray = [];
      let totalExVat = 0;
      for (const id in orderQuantities) {
        if (orderQuantities[id] > 0) {
          const w = wineData[id];
          itemsArray.push(`${orderQuantities[id]}x Bodegas ${w.bodega} - ${w.range} (${w.type}, ${w.cl}cl)`);
          totalExVat += orderQuantities[id] * w.price;
        }
      }

      if (totalExVat === 0) {
        alert('Please select at least one item.');
        return;
      }

      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('submit-error');
      const helperEl = document.getElementById('submit-helper');

      btn.textContent = 'Sending…';
      btn.disabled = true;
      errorEl.style.display = 'none';
      helperEl.style.display = 'none';

      const payload = {
        name, company, phone, email, address, postal,
        itemsList: itemsArray.join(', '),
        totalExVat,
        vat: totalExVat * 0.21,
        totalIncVat: totalExVat * 1.21
      };

      fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            alert('Thank you! Your selection has been submitted successfully.');
            btn.textContent = 'Submitted';
            btn.classList.add('submitted');
            btn.disabled = false;
            helperEl.style.display = 'block';
          } else {
            throw new Error(data.message || 'Unknown error');
          }
        })
        .catch(() => {
          btn.textContent = 'Submit Order';
          btn.classList.remove('submitted');
          btn.disabled = false;
          errorEl.style.display = 'block';
        });
    }
  </script>
</body>

</html>
